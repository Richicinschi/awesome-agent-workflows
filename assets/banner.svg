<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Awesome Agent Workflows</title>
  <desc id="desc">A dark gradient banner for a repository of practical AI agent workflows.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1020"/>
      <stop offset="0.52" stop-color="#121A3A"/>
      <stop offset="1" stop-color="#1D0B2E"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(930 180) rotate(132) scale(420 300)">
      <stop stop-color="#7C3AED" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>
  <rect width="1280" height="640" rx="48" fill="url(#bg)"/>
  <rect width="1280" height="640" rx="48" fill="url(#glow)"/>
  <circle cx="200" cy="510" r="190" fill="#06B6D4" opacity="0.12" filter="url(#soft)"/>
  <circle cx="1110" cy="480" r="220" fill="#F97316" opacity="0.10" filter="url(#soft)"/>

  <g opacity="0.35" stroke="#93C5FD" stroke-width="2">
    <path d="M154 156H342C365 156 384 175 384 198V276C384 299 365 318 342 318H154C131 318 112 299 112 276V198C112 175 131 156 154 156Z"/>
    <path d="M470 96H688C711 96 730 115 730 138V216C730 239 711 258 688 258H470C447 258 428 239 428 216V138C428 115 447 96 470 96Z"/>
    <path d="M820 174H1058C1081 174 1100 193 1100 216V294C1100 317 1081 336 1058 336H820C797 336 778 317 778 294V216C778 193 797 174 820 174Z"/>
    <path d="M384 237H428"/>
    <path d="M730 177L778 238"/>
    <path d="M248 318V396H900V336"/>
  </g>

  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <text x="96" y="405" fill="#F8FAFC" font-size="76" font-weight="800" letter-spacing="-2">Awesome Agent Workflows</text>
    <text x="100" y="464" fill="#CBD5E1" font-size="30" font-weight="500">Copy-pasteable playbooks for operating AI coding agents safely.</text>
