      <rect width="148" height="44" rx="22" fill="#38BDF8" fill-opacity="0.16" stroke="#38BDF8" stroke-opacity="0.5"/>
      <text x="22" y="29" fill="#BAE6FD" font-size="18" font-weight="700">fresh review</text>
    </g>
    <g transform="translate(472 506)">
      <rect width="164" height="44" rx="22" fill="#A78BFA" fill-opacity="0.16" stroke="#A78BFA" stroke-opacity="0.5"/>
